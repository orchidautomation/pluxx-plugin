name: Release Plugin Bundles

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUXX_REPO_DIR: ${{ github.workspace }}/pluxx-cli
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Clone Pluxx CLI repo
        run: git clone --depth 1 https://github.com/orchidautomation/pluxx.git "$PLUXX_REPO_DIR"

      - name: Build and validate plugin
        run: ./scripts/build-with-pluxx-checkout.sh

      - name: Publish GitHub release via core Pluxx publish
        run: ./scripts/publish-github-release-with-pluxx-checkout.sh "${GITHUB_REF_NAME#v}"
